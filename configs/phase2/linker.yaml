data:
  embedding_mode: "on_the_fly"
  train_disorder_file: "data/final_cleaned_dataset/train_final_update_or_caid4_phase2_any_data.txt"
  val_disorder_file: "data/final_cleaned_dataset/val_final_update_or_caid4_phase2_any_data.txt"

model:
  backbone_type: "esmc"
  backbone_name: "esmc_600m"
  hidden_dim: 1152
  dropout: 0.2
  
  # Phase 1 Model (Must match checkpoint architecture!)
  phase1_context_type: bigru
  
  # Phase 2 Function Heads - bilstm or bigru
  phase2_context_type: bilstm
  
  # Phase 1 checkpoint to load (required for Phase 2)
  phase1_checkpoint: "checkpoints/phase1/best_model_final_bigru_unfrozen.pt" # ./checkpoints/phase1/best_model_bce_gauss_01_esm_frozen_v5_pdb01_lr3e4.pt
  
  # Phase 2 specific settings
  use_binding_head: false  # Linker-only training; binding is trained separately
  use_linker_head: true    # Enable linker head

  # LoRA Configuration (must match Phase 1 checkpoint)
  freeze_backbone: false
  use_lora: true
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.1
    layers_to_transform: null
    target_modules: ["attn.out_proj", "ffn.1", "ffn.3"]

training:
  phase: 2  # Use cascDP_Phase2 model
  output_dir: "./checkpoints/phase2/linker"
  num_epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 4
  idr_weight_linker: 1.0 # Penalize linker errors in IDRs (upweight residues where disorder = 1)

  # Loss Configuration
  loss_type: "focal"  # Focal loss for linker prediction
  linker_loss_type: "focal"
  focal_gamma: 2.0
  focal_alpha: 0.9
  # focal_positives_only: false -> denominator = all valid linker tokens (established tuned scale)
  # focal_positives_only: true  -> denominator = positives only (larger loss scale; retune lr/alpha)
  focal_positives_only: false
  linker_gaussian_sigma: 2.0 # Gaussian label smoothing for linker boundaries (like Phase 1 disorder)
  pos_weight_linker: 45.0   # Approx (1 - 0.0218) / 0.0218

  # Optimizer
  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    weight_decay: 0.1
    decouple_weight_decay: true
  
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 50
    eta_min: 1.0e-6
  
  max_grad_norm: 1.0
  eval_every: 1
  save_every: 5
  early_stopping_patience: 5
  
  # Phase 2: Track linker metrics
  best_metric: "val_linker_loss" # "val_linker_auc" # "val_linker_loss"
  best_metric_mode: "min"
  
  num_workers: 2
  use_weighted_sampling: false

# Phase 2: Binding-only training with train + full test split
# Usage: python -m src.cli.train --config configs/phase2/binding_train_plus_test.yaml

data:
  embedding_mode: "on_the_fly"
  train_disorder_file: "data/final_cleaned_dataset/train_plus_test_final_update_or_caid4_phase2_any_data.txt"
  val_disorder_file: "data/final_cleaned_dataset/val_final_update_or_caid4_phase2_any_data.txt"

model:
  backbone_type: "esmc"
  backbone_name: "esmc_600m"
  hidden_dim: 1152
  dropout: 0.2

  phase1_context_type: bigru
  phase2_context_type: bilstm
  phase1_checkpoint: "checkpoints/phase1_train_plus_test_disprot/best_model.pt"

  use_binding_head: true
  use_linker_head: false
  use_crf_linker: false
  binding_combined: false
  binding_head_type: cnn

  # New train file priors over valid Phase 2 residues.
  binding_priors: [0.1143, 0.0237, 0.0136, 0.0110]
  binding_combined_prior: 0.1544
  linker_prior: 0.0205

  freeze_backbone: false
  use_lora: true
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.1
    layers_to_transform: null
    target_modules: ["attn.out_proj", "ffn.1", "ffn.3"]

training:
  phase: 2
  output_dir: "./checkpoints/phase2_train_plus_test/binding"
  num_epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 4
  idr_weight_binding: 1.0

  binding_loss_type: "focal"
  focal_gamma: 2.0
  focal_alpha: 0.8
  pos_weight_binding: 5.0

  optimizer:
    type: "AdamW"
    lr: 2.0e-4
    weight_decay: 0.01
    decouple_weight_decay: true

  scheduler:
    type: "CosineAnnealingLR"
    T_max: 50
    eta_min: 1.0e-6

  max_grad_norm: 1.0
  eval_every: 1
  save_every: 5
  early_stopping_patience: 5

  best_metric: "val_binding_loss"
  best_metric_mode: "min"

  num_workers: 2
  use_weighted_sampling: false

data:
  embedding_mode: "on_the_fly"
  train_disorder_file: "data/final_cleaned_dataset/train_final_update_or_caid4_phase2_any_data.txt"
  val_disorder_file: "data/final_cleaned_dataset/val_final_update_or_caid4_phase2_any_data.txt"

model:
  backbone_type: "esmc"
  backbone_name: "esmc_600m"
  hidden_dim: 1152
  dropout: 0.2

  # Phase 1 Model (Must match checkpoint architecture!)
  phase1_context_type: bigru

  # Phase 2 Function Heads - bilstm or bigru
  phase2_context_type: bilstm
  
  # Phase 1 checkpoint to load (required for Phase 2)
  phase1_checkpoint: "checkpoints/phase1/best_model_final_bigru_unfrozen.pt"

  # Phase 2 specific settings (binding-only)
  use_binding_head: true   # Binding-only training; linker is trained separately
  use_linker_head: false   # Disable linker head
  # binding_combined: true  -> single output head trained on combined-binding label (col 4)
  # binding_combined: false -> 4-output multi-label head (one per binding type)
  binding_combined: false
  # binding_head_type: cnn  -> sequential CNNHead ([128,64], dilation=2)
  # binding_head_type: aspp -> parallel multi-scale ASPP (dilations 2,4,6) + Linear
  binding_head_type: cnn

  # LoRA Configuration (must match Phase 1 checkpoint)
  freeze_backbone: false
  use_lora: true
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.1
    layers_to_transform: null
    target_modules: ["attn.out_proj", "ffn.1", "ffn.3"]

training:
  phase: 2
  output_dir: "./checkpoints/phase2/binding"
  num_epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 4
  idr_weight_binding: 1.0          # Penalize binding errors in IDRs

  # Loss Configuration
  binding_loss_type: "focal"       # Best for imbalanced binding sites
  focal_gamma: 2.0
  focal_alpha: 0.85
  # pos_weight_binding only applies when binding_loss_type: bce
  pos_weight_binding: 5.0

  # Optimizer
  optimizer:
    type: "AdamW"
    lr: 8.0e-4
    weight_decay: 0.1
    decouple_weight_decay: true

  scheduler:
    type: "CosineAnnealingLR"
    T_max: 50
    eta_min: 1.0e-6

  max_grad_norm: 1.0
  eval_every: 1
  save_every: 5
  early_stopping_patience: 5  # AUC can plateau for several epochs; 5 is too tight

  # Phase 2: Track binding metrics
  best_metric: "val_binding_loss"   #val_binding_loss    # binding_auc
  best_metric_mode: "min"

  num_workers: 2
  use_weighted_sampling: false

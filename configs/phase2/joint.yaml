# Phase 2: Joint Binding + Linker Training
# Focus: Train both heads simultaneously (per-head disorder_proj makes this equivalent to separate training)
# No merge step needed — single checkpoint contains both heads.

data:
  embedding_mode: "on_the_fly"
  train_disorder_file: "data/final_cleaned_dataset/train_final_update_or_caid4_phase2_any_data.txt"
  val_disorder_file: "data/final_cleaned_dataset/val_final_update_or_caid4_phase2_any_data.txt"

model:
  backbone_type: "esmc"
  backbone_name: "esmc_600m"
  hidden_dim: 1152
  dropout: 0.2

  # Phase 1 Model (Must match checkpoint architecture!)
  phase1_context_type: bilstm

  # Phase 2 Function Heads - bilstm or bigru
  phase2_context_type: bigru

  # Phase 1 checkpoint to load (required for Phase 2)
  phase1_checkpoint: "./checkpoints/phase1/best_model_bce_gauss_01_esm_frozen_v2.pt"

  # Phase 2 specific settings — both heads enabled
  use_cross_attention: true
  use_binding_head: true
  use_linker_head: true
  use_crf_linker: false

  # LoRA Configuration (must match Phase 1 checkpoint)
  freeze_backbone: true
  use_lora: false
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.1
    layers_to_transform: null
    target_modules: ["attn.out_proj", "ffn.1", "ffn.3"]

training:
  phase: 2
  output_dir: "./checkpoints/phase2/joint"
  num_epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 2

  # IDR weighting (penalize errors in disordered regions)
  idr_weight_binding: 1.0
  idr_weight_linker: 5.0

  # Loss Configuration
  binding_loss_type: "focal"
  linker_loss_type: "bce"
  focal_gamma: 2.0
  focal_alpha: 0.6
  linker_gaussian_sigma: 2.0

  # Optimizer
  optimizer:
    type: "AdamW"
    lr: 2.0e-5
    weight_decay: 0.05

  scheduler:
    type: "CosineAnnealingLR"
    T_max: 100
    eta_min: 1.0e-7

  max_grad_norm: 1.0
  eval_every: 1
  save_every: 5
  early_stopping_patience: 5

  # Track weighted composite of binding + linker AUC
  best_metric: "val_composite_auc"
  best_metric_mode: "max"
  composite_auc_weights:
    binding_auc: 0.5
    linker_auc: 0.5

  num_workers: 2
  use_weighted_sampling: false
